<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OneMonth | Cadastro</title>

    <link rel="stylesheet" href="../css/cadastro.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header>

        <div class="logoTopo">OneMonth</div>

        <nav>
            <a href="cadastro.html">Cadastrar</a>
        </nav>

    </header>

<main class="container">

    <section class="imagem">

        <h1>OneMonth</h1>

    </section>

    <section class="cadastro">

        <div class="card">

            <form id="formCadastro">

                <h2>Cadastro</h2>

                <!-- Nome -->

                <label for="nome">
                    Nome Completo
                </label>

                <div class="campo">

                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        placeholder="Digite seu nome"
                        autocomplete="name">

                </div>

                <p class="erro" id="erroNome"></p>


                <!-- Email -->

                <label for="email">
                    E-mail
                </label>

                <div class="campo">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Digite seu e-mail"
                        autocomplete="email">

                </div>

                <p class="erro" id="erroEmail"></p>


                <!-- Usuário -->

                <label for="usuario">
                    Usuário
                </label>

                <div class="campo">

                    <i class="fa-solid fa-id-card"></i>

                    <input
                        type="text"
                        id="usuario"
                        name="usuario"
                        placeholder="Digite seu usuário"
                        autocomplete="username">

                </div>

                <p class="erro" id="erroUsuario"></p>


                <!-- Senha -->

                <label for="senha">
                    Senha
                </label>

                <div class="campo">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="Digite sua senha"
                        autocomplete="new-password">

                    <i
                        class="fa-solid fa-eye"
                        id="toggleSenha">
                    </i>

                </div>

                <p class="erro" id="erroSenha"></p>

                <div class="forcaSenha">

                    <div id="barraForca"></div>

                </div>

                <p id="textoForca"></p>


                <!-- Confirmar Senha -->

                <label for="confirmarSenha">
                    Confirmar Senha
                </label>

                <div class="campo">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="confirmarSenha"
                        name="confirmarSenha"
                        placeholder="Confirme sua senha"
                        autocomplete="new-password">

                    <i
                        class="fa-solid fa-eye"
                        id="toggleConfirmar">
                    </i>

                </div>

                <p class="erro" id="erroConfirmarSenha"></p>


                <button
                    type="submit"
                    id="btnCadastrar">

                    Cadastrar

                </button>

                <p class="loginLink">

                    Já possui conta?

                    <a href="login.html">

                        Entrar

                    </a>

                </p>

            </form>

        </div>

    </section>

</main>

<script src="../js/cadastro.js"></script>

</body>
</html>
